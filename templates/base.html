<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Monitoring System{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
  {% block head %}{% endblock %}
</head>
<body>
  <div id="app">
    <!-- Sidebar -->
    <nav id="sidebar">
      <div class="sidebar-brand">
        <span class="brand-icon">◈</span>
        <span class="brand-name">Monitor<span class="brand-accent">Pro</span></span>
      </div>
      <ul class="nav-list">
        <li>
          <a href="{{ url_for('index') }}" class="nav-link {% if active_page == 'dashboard' %}active{% endif %}">
            <span class="nav-icon">⊡</span> Dashboard
          </a>
        </li>
        <li>
          <a href="{{ url_for('project.list_projects') }}" class="nav-link {% if active_page == 'projects' %}active{% endif %}">
            <span class="nav-icon">◻</span> Projects
          </a>
        </li>
        <li>
          <a href="{{ url_for('project.new_project') }}" class="nav-link">
            <span class="nav-icon">＋</span> New Project
          </a>
        </li>
      </ul>
      <div class="sidebar-footer">
        <span id="live-badge" class="live-badge hidden">
          <span class="live-dot"></span> LIVE
        </span>
      </div>
    </nav>

    <!-- Main content -->
    <div id="main">
      <header id="topbar">
        <button id="menu-toggle" class="menu-toggle" aria-label="Toggle sidebar">☰</button>
        <div class="topbar-title">{% block topbar_title %}{% endblock %}</div>
        <div class="topbar-right">
          <span id="connection-status" class="conn-status offline">● Offline</span>
        </div>
      </header>
      <main id="content">
        {% block content %}{% endblock %}
      </main>
    </div>
  </div>

  <!-- Toast container -->
  <div id="toast-container" aria-live="polite"></div>

  <!-- CDN scripts -->
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="{{ url_for('static', filename='js/socket.js') }}"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
